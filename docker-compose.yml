version: '3.8'

services:
  webapp:
    build: .
    container_name: matrix-cafe-web
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped

  scheduler:
    build: .
    container_name: menu-scheduler
    volumes:
      - ./data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
    command: ["python", "-u", "scraper/scheduler.py"]
    restart: unless-stopped
